<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>BlueQ Notif</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.svg" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --accent: #0ea5e9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 40%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 16px;
      }

      main {
        width: min(560px, 100%);
        background: var(--card);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 12px 36px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 6px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      .row {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .hidden {
        display: none;
      }

      input,
      button {
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 15px;
        padding: 10px 12px;
      }

      button {
        cursor: pointer;
        border: none;
        background: var(--accent);
        color: white;
        font-weight: 600;
      }

      button.secondary {
        background: #334155;
      }

      #status {
        margin-top: 14px;
        font-size: 14px;
        color: #0f766e;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="subscription-panel">
        <h1>Push Notification Subscription</h1>
        <p>Enter your email address and confirm push notifications for this device.</p>

        <div class="row">
          <input id="email" type="email" placeholder="Email address for this device" />
          <button id="btn-permission">1) Allow notifications</button>
          <button id="btn-subscribe">2) Subscribe to push</button>
        </div>

        <div id="status">Ready.</div>
      </div>

      <div id="welcome" class="hidden">
        <h1 id="welcome-message">Welcome</h1>
      </div>
    </main>

    <script type="module" src="/main.js"></script>
  </body>
</html>
